<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小竹的後宮抽獎機 v4</title>
    <style>
        :root {
            --bg-color: #fdfaf7;
            --card-bg: #ffffff;
            --primary-text: #5a5a5a;
            --accent-color: #d4a373;
            --alert-red: #ff7043;
        }

        body {
            font-family: -apple-system, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 120px;
        }

        h1 { font-size: 1.1rem; margin: 15px 0; font-weight: 500; letter-spacing: 2px; color: #8d6e63; }

        /* 認證區域：穩定顯示，不閃退 */
        #auth-section {
            background: #fff; padding: 25px; border-radius: 20px;
            margin-top: 20px; width: 100%; max-width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;
        }
        #auth-section input {
            width: 100%; margin-bottom: 12px; padding: 12px;
            border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 0.9rem;
        }

        /* 快捷鍵區域 */
        .quick-modes {
            display: flex; gap: 8px; width: 100%; max-width: 500px; 
            margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
        }
        .mode-btn {
            background: white; border: 1px solid #eee; padding: 8px 12px;
            border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: 0.2s;
        }
        .mode-btn.clear { color: var(--alert-red); border-color: #ffebee; }

        /* 分類區塊：自動換行 */
        .group-container { width: 100%; max-width: 500px; margin-bottom: 20px; }
        .group-title { font-size: 0.85rem; font-weight: bold; color: #bc8f8f; margin: 15px 0 10px 5px; }
        
        .grid-flow {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); /* 精緻小方塊 */
            gap: 10px; width: 100%;
        }

        .category-block {
            background: white; aspect-ratio: 1/1; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 0.75rem; cursor: pointer; text-align: center; padding: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03); border: 2px solid transparent;
            transition: 0.2s; word-break: break-all;
        }
        .category-block.selected { border-color: var(--accent-color); background: #fffcf9; color: var(--accent-color); font-weight: bold; }

        /* 抽獎按鈕 */
        #draw-btn {
            position: fixed; bottom: 30px; width: 85%; max-width: 400px;
            background: #d4a373; color: white; border: none;
            padding: 18px; border-radius: 50px; font-size: 1rem; font-weight: bold;
            box-shadow: 0 8px 20px rgba(212, 163, 115, 0.4); z-index: 100;
        }

        /* 結果視窗 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #fdfaf7; width: 88%; max-width: 380px; max-height: 80vh;
            padding: 20px; border-radius: 30px; display: flex; flex-direction: column;
        }
        #result-list { overflow-y: auto; flex-grow: 1; margin: 15px 0; padding-right: 5px; }
        
        .result-group { margin-bottom: 18px; }
        .result-group-header { font-size: 0.75rem; color: #bc8f8f; border-bottom: 1px dashed #ede0d4; padding-bottom: 4px; margin-bottom: 10px; font-weight: bold; }
        .result-item { background: white; margin-bottom: 8px; padding: 12px; border-radius: 12px; }
        .result-brand { font-size: 0.65rem; color: #9a8c98; letter-spacing: 0.5px; text-transform: uppercase; }
        .result-name { font-weight: bold; font-size: 0.95rem; color: #4e342e; margin: 2px 0; }
        .result-note { font-size: 0.75rem; color: #8d6e63; margin-top: 3px; }
        .expired-alert { color: var(--alert-red); font-weight: bold; font-size: 0.7rem; margin-top: 5px; border-top: 1px solid #fff3e0; padding-top: 5px; }
    </style>
</head>
<body>

    <h1>✨ 小竹的後宮抽獎機</h1>

    <!-- 認證區：如果沒有 Token 才顯示 -->
    <div id="auth-section" style="display:none;">
        <h3 style="color:#8d6e63; font-size:1rem;">🔑 第一次見面請輸入金鑰</h3>
        <input type="password" id="input-token" placeholder="貼上 Notion Token (secret_...)">
        <input type="text" id="input-dbid" placeholder="貼上 Database ID">
        <button onclick="saveAuth()" style="width:100%; padding:12px; background:#d4a373; color:white; border:none; border-radius:10px;">儲存並進入</button>
        <p style="font-size:0.7rem; color:#aaa; margin-top:10px;">金鑰將安全儲存在您的手機本地空間</p>
    </div>

    <!-- 功能區：連線成功後顯示 -->
    <div id="app-container" style="display:none; width:100%;">
        <div class="quick-modes">
            <button class="mode-btn" onclick="setMode('simple')">🧼 簡單</button>
            <button class="mode-btn" onclick="setMode('full')">💄 全選</button>
            <button class="mode-btn" onclick="setMode('random')">🎲 隨機</button>
            <button class="mode-btn clear" onclick="setMode('clear')">🧹 清除</button>
        </div>

        <div id="main-ui"></div>
        <button id="draw-btn" onclick="startDraw()">今日寵幸 ➔</button>
    </div>

    <!-- 結果彈窗 -->
    <div id="result-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="text-align:center; color:#8d6e63; font-size:1.1rem; margin-top:0;">✨ 今日寵幸名單 ✨</h2>
            <div id="result-list"></div>
            <button onclick="document.getElementById('result-modal').style.display='none'" style="width:100%; padding:15px; border-radius:50px; border:none; background:#d4a373; color:white; font-weight:bold;">謝主隆恩</button>
        </div>
    </div>

    <script>
        let NOTION_TOKEN = localStorage.getItem('notion_token');
        let DATABASE_ID = localStorage.getItem('notion_dbid');
        let allProducts = [];

        async function init() {
            const authDiv = document.getElementById('auth-section');
            const appDiv = document.getElementById('app-container');

            if (!NOTION_TOKEN || !DATABASE_ID) {
                authDiv.style.display = 'block';
                return;
            }

            authDiv.style.display = 'none';
            appDiv.style.display = 'block';
            document.getElementById('main-ui').innerHTML = "<p style='text-align:center; color:#888; font-size:0.9rem; margin-top:30px;'>正在搬運後宮...</p>";

            try {
                const url = `https://api.notion.com/v1/databases/${DATABASE_ID}/query`;
                const response = await fetch('https://corsproxy.io/?' + encodeURIComponent(url), {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${NOTION_TOKEN}`, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
                    body: JSON.stringify({}) 
                });
                const data = await response.json();
                
                if (data.object === 'error') throw new Error();

                allProducts = data.results.map(item => {
                    const p = item.properties;
                    const sub = p["分類"]?.select?.name || "未分類";
                    const makeupCats = ['底妝','防曬/妝前','遮瑕','定妝','腮紅','修容','打亮','眼影','睫毛膏','唇彩'];
                    return {
                        name: p["名稱"]?.title[0]?.plain_text || "未命名",
                        brand: p["品牌"]?.select?.name || p["品牌"]?.rich_text?.[0]?.plain_text || "",
                        mainGroup: makeupCats.includes(sub) ? "💄 化妝品" : (sub === '工具' ? "🔧 工具" : "💧 保養品"),
                        subCat: sub,
                        daysLeft: p["公式_到期天數"]?.formula?.number ?? 999,
                        note: p["使用備註"]?.rich_text[0]?.plain_text || ""
                    };
                });
                renderUI();
            } catch (e) {
                console.error(e);
                localStorage.clear();
                alert("連線驗證失敗，請檢查 Token 後重新整理。");
                location.reload();
            }
        }

        function renderUI() {
            const container = document.getElementById('main-ui');
            container.innerHTML = "";
            const groups = ["💧 保養品", "💄 化妝品", "🔧 工具"];
            
            groups.forEach(gName => {
                const groupProducts = allProducts.filter(p => p.mainGroup === gName);
                if (groupProducts.length === 0) return;
                const subCats = [...new Set(groupProducts.map(p => p.subCat))];
                
                const section = document.createElement('div');
                section.className = "group-container";
                section.innerHTML = `<div class="group-title">${gName}</div>`;
                
                const grid = document.createElement('div');
                grid.className = "grid-flow";
                subCats.forEach(s => {
                    const div = document.createElement('div');
                    div.className = "category-block";
                    div.id = `cat-${s}`;
                    div.innerHTML = `<span>${s}</span>`;
                    div.onclick = () => div.classList.toggle('selected');
                    grid.appendChild(div);
                });
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function setMode(mode) {
            const blocks = Array.from(document.querySelectorAll('.category-block'));
            blocks.forEach(b => b.classList.remove('selected'));

            if (mode === 'full') {
                blocks.forEach(b => b.classList.add('selected'));
            } else if (mode === 'simple') {
                ['化妝水', '乳液/霜', '防曬/妝前'].forEach(t => {
                    const el = document.getElementById(`cat-${t}`);
                    if (el) el.classList.add('selected');
                });
            } else if (mode === 'random') {
                const count = Math.floor(Math.random() * 4) + 4; 
                const shuffled = blocks.sort(() => 0.5 - Math.random());
                shuffled.slice(0, count).forEach(b => b.classList.add('selected'));
            }
        }

        function startDraw() {
            const selectedCats = Array.from(document.querySelectorAll('.category-block.selected')).map(el => el.innerText);
            if (selectedCats.length === 0) return alert("主子請先選幾個分類方塊！");

            let drawResults = [];
            selectedCats.forEach(cat => {
                const pool = allProducts.filter(p => p.subCat === cat);
                if (pool.length > 0) {
                    let weightedPool = [];
                    pool.forEach(p => {
                        let weight = (p.daysLeft < 30 && p.daysLeft >= 0) ? 10 : 1;
                        for(let i=0; i<weight; i++) weightedPool.push(p);
                    });
                    drawResults.push(weightedPool[Math.floor(Math.random() * weightedPool.length)]);
                }
            });
            showResult(drawResults);
        }

        function showResult(items) {
            const list = document.getElementById('result-list');
            list.innerHTML = "";
            const groups = ["💧 保養品", "💄 化妝品", "🔧 工具"];
            
            groups.forEach(g => {
                const gItems = items.filter(i => i.mainGroup === g);
                if (gItems.length > 0) {
                    const gDiv = document.createElement('div');
                    gDiv.className = "result-group";
                    gDiv.innerHTML = `<div class="result-group-header">${g}</div>`;
                    gItems.forEach(i => {
                        gDiv.innerHTML += `
                            <div class="result-item">
                                <div class="result-brand">${i.brand}</div>
                                <div class="result-name">${i.name}</div>
                                ${i.note ? `<div class="result-note">💡 ${i.note}</div>` : ''}
                                ${i.daysLeft < 0 ? `<div class="expired-alert">🚨 建議斷捨離 (已過期)</div>` : ''}
                            </div>`;
                    });
                    list.appendChild(gDiv);
                }
            });
            document.getElementById('result-modal').style.display = 'flex';
        }

        function saveAuth() {
            const t = document.getElementById('input-token').value.trim();
            const d = document.getElementById('input-dbid').value.trim();
            if (t && d) {
                localStorage.setItem('notion_token', t);
                localStorage.setItem('notion_dbid', d);
                // 這次不 reload，直接呼叫 init() 啟動
                NOTION_TOKEN = t;
                DATABASE_ID = d;
                init();
            } else { alert("請填寫完整的金鑰資料喔！"); }
        }

        init();
    </script>
</body>
</html>
